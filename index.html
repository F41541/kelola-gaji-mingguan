<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompet Minimalis V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-100">
        <div class="bg-indigo-900 p-6 text-white text-center">
            <h1 class="text-xl font-bold mb-1">Manajer Keuangan</h1>
            <div class="mt-4 bg-white/10 rounded-xl p-4 border border-white/20">
                <p class="text-sm opacity-80 mb-1">Dana Belum Dialokasikan</p>
                <h2 class="text-3xl font-extrabold tracking-tight" id="unallocatedBalance">Rp 0</h2>
                <button onclick="addSalary()" class="mt-4 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg shadow-sm transition-all text-sm">
                    + Input Uang Masuk (Nominal)
                </button>
            </div>
        </div>

        <div class="p-6">
            <div class="mb-4 flex justify-between items-center">
                <h3 class="font-semibold text-slate-700">Alokasi Pos (Siklus 4 Minggu)</h3>
            </div>
            
            <div id="budgetsList" class="space-y-4">
                </div>

            <div class="mt-8 pt-4 border-t border-slate-100 text-center">
                <button onclick="resetApp()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                    Reset Semua Data
                </button>
            </div>
        </div>
    </div>

    <script>
        const budgetConfig = [
            { id: 'nabung', name: 'Nabung', target: 200000, suggest: 50000 },
            { id: 'hutang', name: 'Hutang Pacar', target: 200000, suggest: 50000 },
            { id: 'wifi', name: 'Wifi (Tgl 26)', target: 236000, suggest: 59000 },
            { id: 'kredivo', name: 'Kredivo (Tgl 2)', target: 444000, suggest: 111000 },
            { id: 'jajan', name: 'Uang Jajan', target: 400000, suggest: 100000 },
            { id: 'vape', name: 'Utilitas Vape (Tgl 30)', target: 180000, suggest: 45000 },
            { id: 'jaga', name: 'Jaga-jaga', target: 240000, suggest: 60000 }
        ];

        // Mempertahankan key V3 agar data saldo yang sudah diinput tidak hangus
        let state = JSON.parse(localStorage.getItem('financeTrackerV3')) || {
            unallocated: 0,
            balances: budgetConfig.reduce((acc, item) => ({ ...acc, [item.id]: 0 }), {})
        };

        const formatRp = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        const saveState = () => {
            localStorage.setItem('financeTrackerV3', JSON.stringify(state));
            render();
        };

        const addSalary = () => {
            const amountStr = prompt("Masukkan nominal uang yang diterima:");
            if (!amountStr) return;

            const amount = parseInt(amountStr.replace(/[^0-9]/g, ''));
            
            if (isNaN(amount) || amount <= 0) {
                alert("Masukkan nominal angka yang valid.");
                return;
            }

            state.unallocated += amount;
            saveState();
        };

        const allocateMoney = (id, name, suggest) => {
            if (state.unallocated <= 0) {
                alert("Dana belum dialokasikan kosong.");
                return;
            }

            const amountStr = prompt(
                `Isi pos ${name}\nDana tersedia: ${formatRp(state.unallocated)}\nSaran nominal (mingguan):`, 
                suggest
            );
            if (!amountStr) return;

            const amount = parseInt(amountStr.replace(/[^0-9]/g, ''));
            if (isNaN(amount) || amount <= 0) return;

            if (amount > state.unallocated) {
                alert("Uang tidak cukup!");
                return;
            }

            state.unallocated -= amount;
            state.balances[id] += amount;
            saveState();
        };

        const spendMoney = (id, name) => {
            const amountStr = prompt(`Gunakan saldo ${name}?\nSaldo saat ini: ${formatRp(state.balances[id])}\nMasukkan nominal:`);
            if (!amountStr) return;

            const amount = parseInt(amountStr.replace(/[^0-9]/g, ''));
            if (isNaN(amount) || amount <= 0) return;

            if (amount > state.balances[id]) {
                alert("Saldo pos tidak cukup!");
                return;
            }

            state.balances[id] -= amount;
            saveState();
        };

        const resetApp = () => {
            if (confirm("Reset seluruh data ke Rp 0?")) {
                state.unallocated = 0;
                budgetConfig.forEach(item => { state.balances[item.id] = 0; });
                saveState();
            }
        };

        const render = () => {
            document.getElementById('unallocatedBalance').innerText = formatRp(state.unallocated);

            const listHTML = budgetConfig.map(item => {
                const balance = state.balances[item.id];
                const percentage = Math.min((balance / item.target) * 100, 100);
                const barColor = balance >= item.target ? 'bg-emerald-500' : 'bg-indigo-500';

                return `
                    <div class="bg-white border border-slate-100 p-4 rounded-xl shadow-sm hover:shadow-md transition-all duration-300 group cursor-default">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm">${item.name}</h4>
                                <span class="text-[10px] font-medium text-slate-400 mt-0.5 inline-block">
                                    Saran setor: ${formatRp(item.suggest)}
                                </span>
                            </div>
                            <div class="text-right group-hover:opacity-0 transition-opacity duration-300">
                                <span class="font-bold text-slate-700 text-sm">${formatRp(balance)}</span>
                            </div>
                        </div>
                        
                        <div class="relative flex flex-col justify-end">
                            <div class="absolute bottom-full right-0 mb-1.5 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-1 group-hover:translate-y-0 flex items-center gap-1">
                                <span class="font-bold text-slate-800 text-[11px]">${formatRp(balance)}</span>
                                <span class="text-[10px] text-slate-400 font-medium">/ ${formatRp(item.target)}</span>
                            </div>
                            
                            <div class="w-full bg-slate-100 h-1 group-hover:h-2 rounded-full overflow-hidden transition-all duration-300">
                                <div class="${barColor} h-full transition-all duration-300 ease-out" style="width: ${percentage}%"></div>
                            </div>
                        </div>

                        <div class="flex gap-2 mt-4">
                            <button onclick="allocateMoney('${item.id}', '${item.name}', ${item.suggest})" class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-[10px] font-bold py-2 rounded-lg transition-colors border border-indigo-50 uppercase tracking-tight">
                                + Isi Pos
                            </button>
                            <button onclick="spendMoney('${item.id}', '${item.name}')" class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-700 text-[10px] font-bold py-2 rounded-lg transition-colors border border-slate-100 uppercase tracking-tight">
                                - Pakai
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('budgetsList').innerHTML = listHTML;
        };

        render();
    </script>
</body>
</html>
